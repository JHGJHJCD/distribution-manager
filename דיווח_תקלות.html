<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כלי דיווח תקלות — מנהל חלוקה</title>
<style>
/* ============================================================================
   כלי דיווח תקלות — מנהל חלוקה
   קובץ יחיד (HTML + CSS + JS), ללא שרת וללא התקנות. שמירה אוטומטית ב-LocalStorage.
   העיצוב תואם את התוכנה: כחול #1565c0/#2b95ef, כרטיסים לבנים על רקע אפור בהיר.
   ---------------------------------------------------------------------------
   מבנה הנתונים:
     APP_STRUCTURE = [{ key, name, icon, items:[{key,name,type,desc}] }]
     state.bugs    = { "<tabKey>::<itemKey>": [ {id, severity, status, desc,
                        steps, actual, expected, notes, shots:[{name,data}]} ] }
   כדי להרחיב — הוסף לשונית/פריט ל-APP_STRUCTURE; שאר הכלי מתעדכן אוטומטית.
============================================================================ */
:root{
  --bg:#eef2f8; --card:#ffffff; --line:#e6eaf2; --ink:#0d2a4a; --muted:#64748b;
  --blue:#1565c0; --blue2:#2b95ef; --blue-soft:#eaf3ff;
  --green:#059669; --amber:#b45309; --red:#dc2626; --purple:#6d28d9;
  --radius:12px; --shadow:0 1px 3px rgba(15,40,80,.06),0 4px 16px rgba(15,40,80,.05);
}
*{box-sizing:border-box;}
body{
  margin:0; font-family:'Segoe UI',Arial,sans-serif; background:var(--bg);
  color:var(--ink); direction:rtl; font-size:14px; line-height:1.5;
}
button{font-family:inherit; cursor:pointer;}
textarea,input,select{font-family:inherit;}

/* ── Top app-bar (mirrors the program) ─────────────────────────────────── */
.appbar{
  background:linear-gradient(180deg,#1e78d6,#1257ad); color:#fff;
  padding:14px 22px; display:flex; align-items:center; gap:16px;
  box-shadow:0 2px 10px rgba(13,42,74,.25); position:sticky; top:0; z-index:50;
}
.appbar .logo{
  width:46px;height:46px;border-radius:10px;background:#fff;color:var(--blue);
  display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;
}
.appbar h1{font-size:20px;margin:0;font-weight:800;}
.appbar .sub{font-size:12.5px;opacity:.9;}
.appbar .spacer{flex:1;}

/* ── Statistics strip ──────────────────────────────────────────────────── */
.stats{display:flex;gap:10px;flex-wrap:wrap;padding:14px 22px 4px;}
.stat{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:8px 16px;min-width:96px;text-align:center;box-shadow:var(--shadow);
}
.stat b{display:block;font-size:22px;font-weight:900;line-height:1.1;}
.stat span{font-size:12px;color:var(--muted);}
.stat.total b{color:var(--blue);}
.stat.open  b{color:var(--amber);}
.stat.prog  b{color:var(--purple);}
.stat.fixed b{color:var(--green);}
.stat.ver   b{color:#0891b2;}
.stat.crit  b{color:var(--red);}

/* ── Toolbar ───────────────────────────────────────────────────────────── */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:10px 22px 14px;}
.toolbar input[type=search],.toolbar select{
  border:1px solid #d7dfea;border-radius:10px;padding:9px 12px;background:#fff;font-size:14px;
}
.toolbar input[type=search]{min-width:240px;flex:1;max-width:420px;}
.btn{
  border:none;border-radius:10px;padding:9px 18px;font-weight:800;font-size:14px;color:#fff;
  background:linear-gradient(180deg,var(--blue2),var(--blue));box-shadow:var(--shadow);
}
.btn:hover{filter:brightness(1.06);}
.btn.ghost{background:#fff;color:#1f2937;border:1px solid #d7dfea;}
.btn.green{background:linear-gradient(180deg,#34d399,#059669);}
.btn.small{padding:5px 12px;font-size:12.5px;border-radius:8px;}
.btn.danger{background:linear-gradient(180deg,#f87171,#dc2626);}

/* ── Layout: sidebar (tabs) + content ──────────────────────────────────── */
.layout{display:flex;gap:16px;padding:0 22px 40px;align-items:flex-start;}
.sidebar{
  width:230px;flex:none;position:sticky;top:96px;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;
}
.sidebar h3{margin:0;padding:12px 16px;font-size:13px;color:var(--muted);
  border-bottom:1px solid var(--line);background:#f7f9fc;font-weight:800;}
.tab-btn{
  display:flex;align-items:center;gap:10px;width:100%;text-align:right;
  background:none;border:none;padding:12px 16px;font-size:15px;font-weight:700;color:var(--ink);
  border-bottom:1px solid #f1f4f9;
}
.tab-btn .ic{font-size:18px;}
.tab-btn .cnt{margin-inline-start:auto;background:var(--blue-soft);color:var(--blue);
  border-radius:20px;padding:1px 9px;font-size:12px;font-weight:800;min-width:22px;text-align:center;}
.tab-btn:hover{background:#f7f9fc;}
.tab-btn.active{background:var(--blue-soft);color:var(--blue);box-shadow:inset 3px 0 0 var(--blue);}

.content{flex:1;min-width:0;}
.content-head{display:flex;align-items:baseline;gap:12px;margin:4px 0 14px;}
.content-head h2{margin:0;font-size:22px;font-weight:800;}
.content-head .desc{color:var(--muted);font-size:13px;}

/* ── Item cards ────────────────────────────────────────────────────────── */
.item{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;
}
.item-head{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#f7f9fc;
  border-bottom:1px solid var(--line);}
.item-head .name{font-weight:800;font-size:15.5px;}
.type-badge{font-size:11.5px;font-weight:800;border-radius:20px;padding:2px 10px;color:#fff;}
.type-field{background:#0891b2;} .type-button{background:var(--blue);}
.type-action{background:var(--purple);} .type-table{background:#475569;}
.item-head .idesc{color:var(--muted);font-size:12.5px;}
.item-head .grow{flex:1;}
.item-body{padding:12px 16px;}
.no-bugs{color:#94a3b8;font-size:13px;padding:2px 2px 10px;}

/* ── Bug cards ─────────────────────────────────────────────────────────── */
.bug{border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-bottom:12px;background:#fcfdff;}
.bug.sev-critical{border-inline-start:5px solid var(--red);}
.bug.sev-high{border-inline-start:5px solid #ea580c;}
.bug.sev-medium{border-inline-start:5px solid var(--amber);}
.bug.sev-low{border-inline-start:5px solid #16a34a;}
.bug-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
.bug-top select{border:1px solid #d7dfea;border-radius:8px;padding:5px 8px;font-size:12.5px;font-weight:700;}
.bug-top .bug-id{color:#94a3b8;font-size:12px;margin-inline-start:auto;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fieldbox label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:3px;}
.fieldbox textarea{
  width:100%;border:1px solid #d7dfea;border-radius:8px;padding:8px;font-size:13.5px;resize:vertical;
  min-height:46px;background:#fff;
}
.fieldbox textarea.desc{min-height:60px;}
.fieldbox{margin-bottom:9px;}
.dropzone{
  border:2px dashed #c7d2e0;border-radius:8px;padding:10px;text-align:center;color:#94a3b8;
  font-size:12.5px;background:#f8fafc;cursor:pointer;transition:.15s;
}
.dropzone.over{border-color:var(--blue2);background:var(--blue-soft);color:var(--blue);}
.shots{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.shot{position:relative;}
.shot img{width:84px;height:64px;object-fit:cover;border-radius:6px;border:1px solid #cbd5e1;cursor:pointer;}
.shot .del{position:absolute;top:-7px;inset-inline-start:-7px;background:var(--red);color:#fff;border:none;
  border-radius:50%;width:20px;height:20px;font-weight:900;font-size:12px;line-height:1;}
.bug-actions{display:flex;gap:8px;margin-top:8px;}

/* severity/status colour tags in selects */
.sel-status[data-v="fixed"],.sel-status[data-v="verified"]{color:var(--green);}
.sel-status[data-v="in-progress"]{color:var(--purple);}
.sel-status[data-v="new"]{color:var(--amber);}

/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(13,42,74,.85);display:none;align-items:center;
  justify-content:center;z-index:100;padding:30px;}
.lightbox.show{display:flex;}
.lightbox img{max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5);}

.empty-note{color:#94a3b8;text-align:center;padding:40px;font-size:15px;}
@media(max-width:820px){
  .layout{flex-direction:column;} .sidebar{width:100%;position:static;}
  .grid2{grid-template-columns:1fr;}
}
.toast{position:fixed;inset-inline-end:20px;bottom:20px;background:#0d2a4a;color:#fff;padding:10px 18px;
  border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.3);opacity:0;transform:translateY(10px);
  transition:.2s;z-index:120;font-weight:700;}
.toast.show{opacity:1;transform:none;}
</style>
</head>
<body>

<div class="appbar">
  <div class="logo">🐞</div>
  <div>
    <h1>כלי דיווח תקלות</h1>
    <div class="sub">מנהל חלוקה · קופה של צדקה הר יונה · נוף הגליל</div>
  </div>
  <div class="spacer"></div>
  <button class="btn ghost" onclick="exportReport()">⬇ ייצוא דוח</button>
  <button class="btn" onclick="copyReport()">📋 העתק ללוח</button>
</div>

<div class="stats" id="stats"></div>

<div class="toolbar">
  <input type="search" id="search" placeholder="🔎 חיפוש בתקלות: תיאור, שלבים, פריט..." oninput="render()">
  <select id="fSeverity" onchange="render()">
    <option value="">כל החומרות</option>
    <option value="critical">קריטי</option>
    <option value="high">גבוה</option>
    <option value="medium">בינוני</option>
    <option value="low">נמוך</option>
  </select>
  <select id="fStatus" onchange="render()">
    <option value="">כל הסטטוסים</option>
    <option value="new">חדש</option>
    <option value="in-progress">בטיפול</option>
    <option value="fixed">תוקן</option>
    <option value="verified">נבדק</option>
  </select>
  <button class="btn ghost small" onclick="clearAll()">🗑 נקה הכל</button>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <h3>לשוניות התוכנה</h3>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')"><img id="lbImg" src=""></div>
<div class="toast" id="toast"></div>

<script>
/* ======================= מבנה התוכנה (לשוניות ופריטים) ======================= */
const APP_STRUCTURE = [
  { key:"dist", name:"חלוקה ורישום", icon:"📋", items:[
    {key:"name",   name:"שדה: שם החלוקה", type:"field",  desc:"חובה לפני הדפסה; הצעות משמות קודמים"},
    {key:"date",   name:"שדה: תאריך",     type:"field",  desc:"לוח שנה, ימי רביעי מסומנים"},
    {key:"distr",  name:"שדה: מחלק",      type:"field",  desc:"שם מבצע החלוקה; נזכר אוטומטית"},
    {key:"prod",   name:"שדה: מוצרים זמינים", type:"field", desc:"מספר המנות; קובע כמה נשאר לחד-פעמיים"},
    {key:"reserve",name:"שדה: רזרבה",     type:"field",  desc:"כמה אנשי רזרבה לצרף לחד-פעמיים"},
    {key:"note",   name:"שדה: הערה כללית לחלוקה", type:"field", desc:"נשמרת פעם אחת ברמת החלוקה"},
    {key:"leftover",name:"חיווי: נשאר לחד-פעמיים", type:"action", desc:"מציג כמה מנות נותרו ואם נבחרו"},
    {key:"vmail",  name:"שדה: אימייל המתנדב", type:"field", desc:"כתובת המתנדב שימלא את הרשימה"},
    {key:"vsend",  name:"כפתור: שלח למתנדב", type:"button", desc:"שולח קובץ רשימה במייל"},
    {key:"vimport",name:"כפתור: יבוא ידני", type:"button", desc:"ייבוא ידני של קובץ שהתקבל"},
    {key:"mode",   name:"בורר: מצב חלוקה לקבועים", type:"action", desc:"רגיל / בלי קבועים / לפי ניקוד"},
    {key:"leaders",name:"כפתור: סמן מובילים", type:"button", desc:"מצב 'לפי ניקוד' — מסמן top-N"},
    {key:"qsearch",name:"שדה: חיפוש מהיר ברשימה", type:"field", desc:"סינון הרשימה לפי כל פרט"},
    {key:"checkall",name:"כפתורים: בחר הכל / בטל הכל", type:"button", desc:"סימון/ביטול המוני"},
    {key:"table",  name:"טבלת המקבלים", type:"table", desc:"סימון קבלה + הערה לכל מקבל"},
    {key:"save",   name:"כפתור: שמור חלוקה", type:"button", desc:"רושם להיסטוריה + מייצא אקסל"},
    {key:"print",  name:"כפתור: הדפסה לחלוקה", type:"button", desc:"מדפיס את הרשימה (A4)"},
  ]},
  { key:"recipients", name:"מקבלים", icon:"👥", items:[
    {key:"search", name:"שדה חיפוש", type:"field", desc:"שם, טלפון, ת״ז, כתובת"},
    {key:"filter", name:"סינון סטטוס / עדיפות", type:"action", desc:"פעיל/מושהה, לפי דרגה"},
    {key:"add",    name:"כפתור: + הוסף מקבל", type:"button", desc:"טופס הוספת משפחה/מקבל"},
    {key:"import", name:"כפתור: יבוא מ-Excel", type:"button", desc:"ייבוא רשימה שלמה מאקסל"},
    {key:"dups",   name:"כפתור: בדיקת כפילויות", type:"button", desc:"מאתר רשומות כפולות"},
    {key:"rowbtns",name:"כפתורים: הפעל / השהה / מחק", type:"button", desc:"פעולות על השורה"},
    {key:"table",  name:"טבלת המקבלים (לחיצה כפולה=עריכה)", type:"table", desc:"עריכת פרטי מקבל"},
  ]},
  { key:"one_time", name:"חד פעמי", icon:"⭐", items:[
    {key:"search", name:"שדה חיפוש", type:"field", desc:"סינון הרשימה"},
    {key:"info",   name:"חיווי: מוצרים/קבועים/לחד-פעמיים/רזרבה", type:"action", desc:"נקרא מ'חלוקה ורישום'"},
    {key:"calc",   name:"כפתור: חשב המלצה", type:"button", desc:"מסמן מומלצים לפי עדיפות וניקוד"},
    {key:"table",  name:"טבלה (לחיצה על שם=פירוט ניקוד)", type:"table", desc:"בחר, שם, עדיפות, ניקוד, חלוקה אחרונה"},
    {key:"addgrp", name:"כפתור: הוסף נבחרים לעדכון קבוצתי", type:"button", desc:"מעביר את הנבחרים לחלוקה"},
  ]},
  { key:"search", name:"חיפוש מהיר", icon:"🔍", items:[
    {key:"input",  name:"שדה חיפוש", type:"field", desc:"חיפוש מקבל בכל השדות"},
    {key:"results",name:"רשימת תוצאות", type:"table", desc:"בחירה מציגה פרופיל"},
    {key:"profile",name:"כרטיס פרופיל + היסטוריה", type:"action", desc:"פרטי המקבל וחלוקותיו"},
    {key:"export", name:"כפתור: ייצוא הרשימה", type:"button", desc:"מוריד תוצאות לאקסל"},
    {key:"printcard",name:"כפתור: הדפסת כרטיס מקבל", type:"button", desc:"מדפיס כרטיס פרטים (גופן גדול)"},
  ]},
  { key:"distributions", name:"חלוקות", icon:"📦", items:[
    {key:"table",  name:"טבלת החלוקות (לחיצה כפולה=פרטים)", type:"table", desc:"שורה לכל אירוע חלוקה"},
    {key:"delete", name:"כפתור: מחק חלוקה", type:"button", desc:"מוחק אצווה ורישומיה (מגלגל תאריכים)"},
  ]},
  { key:"settings", name:"הגדרות", icon:"⚙️", items:[
    {key:"pwd",    name:"אבטחה: שנה סיסמה", type:"button", desc:"שינוי סיסמת הכניסה"},
    {key:"update", name:"עדכון תוכנה: בדוק עדכונים", type:"button", desc:"בדיקת גרסה חדשה"},
    {key:"backup", name:"גיבויים: בחר תיקייה / גבה עכשיו / שחזר", type:"button", desc:"ניהול גיבויים"},
    {key:"weights",name:"משקלי ניקוד: שמור / אפס", type:"action", desc:"כיוון משקלי הניקוד (סכום 100%)"},
    {key:"mail",   name:"מייל למתנדבים: שמור / שלח מייל בדיקה", type:"button", desc:"הגדרות SMTP + בדיקה"},
    {key:"org",    name:"שם הארגון: כותרת / לוגו", type:"field", desc:"מיתוג הסרגל העליון"},
    {key:"reset",  name:"אזור מסוכן: אפס את כל הנתונים", type:"action", desc:"מחיקה בלתי הפיכה"},
    {key:"feedback",name:"כפתור: השאר הודעה למפתח", type:"button", desc:"שליחת משוב (+ אפשרות במייל)"},
  ]},
];

const SEVERITIES = {critical:"קריטי", high:"גבוה", medium:"בינוני", low:"נמוך"};
const STATUSES   = {new:"חדש", "in-progress":"בטיפול", fixed:"תוקן", verified:"נבדק"};

/* ============================== מצב + אחסון ============================== */
const LS_KEY = "manhal_bug_reports_v1";
let state = { bugs:{}, activeTab: APP_STRUCTURE[0].key };
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const p = JSON.parse(raw); state.bugs = p.bugs||{}; state.activeTab = p.activeTab||state.activeTab; }
  }catch(e){ console.warn("load failed", e); }
}
let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
    catch(e){ toast("⚠ שמירה נכשלה (אולי אין מקום ל-LocalStorage)"); }
  }, 250);
}
function itemKey(tab,item){ return tab+"::"+item; }
function bugsFor(tab,item){ return state.bugs[itemKey(tab,item)] || []; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ============================== פעולות תקלה ============================== */
function newBug(tab,item){
  const k = itemKey(tab,item);
  (state.bugs[k] = state.bugs[k]||[]).push({
    id:uid(), severity:"medium", status:"new",
    desc:"", steps:"", actual:"", expected:"", notes:"", shots:[]
  });
  save(); render();
}
function delBug(tab,item,id){
  const k = itemKey(tab,item);
  if(!confirm("למחוק את התקלה?")) return;
  state.bugs[k] = (state.bugs[k]||[]).filter(b=>b.id!==id);
  if(!state.bugs[k].length) delete state.bugs[k];
  save(); render();
}
function dupBug(tab,item,id){
  const k = itemKey(tab,item);
  const src = (state.bugs[k]||[]).find(b=>b.id===id);
  if(!src) return;
  const copy = JSON.parse(JSON.stringify(src)); copy.id = uid();
  const idx = state.bugs[k].findIndex(b=>b.id===id);
  state.bugs[k].splice(idx+1,0,copy);
  save(); render();
}
function updBug(tab,item,id,field,val){
  const b = (state.bugs[itemKey(tab,item)]||[]).find(x=>x.id===id);
  if(b){ b[field]=val; save(); if(field==="severity"||field==="status") render(); else updateStats(); }
}

/* ============================== צילומי מסך ============================== */
function addShots(tab,item,id,files){
  const b = (state.bugs[itemKey(tab,item)]||[]).find(x=>x.id===id);
  if(!b) return;
  let pending = 0;
  [...files].forEach(f=>{
    if(!f.type.startsWith("image/")) return;
    pending++;
    const r = new FileReader();
    r.onload = e=>{ b.shots.push({name:f.name, data:e.target.result}); if(--pending===0){ save(); render(); } };
    r.readAsDataURL(f);
  });
}
function delShot(tab,item,id,idx){
  const b = (state.bugs[itemKey(tab,item)]||[]).find(x=>x.id===id);
  if(b){ b.shots.splice(idx,1); save(); render(); }
}
function lightbox(src){ const lb=document.getElementById("lightbox"); document.getElementById("lbImg").src=src; lb.classList.add("show"); }

/* ============================== סינון ============================== */
function activeFilters(){
  return {
    q: document.getElementById("search").value.trim().toLowerCase(),
    sev: document.getElementById("fSeverity").value,
    st: document.getElementById("fStatus").value,
  };
}
function bugMatches(b,item,f){
  if(f.sev && b.severity!==f.sev) return false;
  if(f.st && b.status!==f.st) return false;
  if(f.q){
    const hay = [b.desc,b.steps,b.actual,b.expected,b.notes,item.name].join(" ").toLowerCase();
    if(!hay.includes(f.q)) return false;
  }
  return true;
}
function filtering(f){ return !!(f.q||f.sev||f.st); }

/* ============================== רינדור ============================== */
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function countAll(){
  let c={total:0,new:0,"in-progress":0,fixed:0,verified:0,critical:0};
  for(const k in state.bugs) for(const b of state.bugs[k]){
    c.total++; c[b.status]=(c[b.status]||0)+1; if(b.severity==="critical") c.critical++;
  }
  return c;
}
function updateStats(){
  const c = countAll();
  document.getElementById("stats").innerHTML = `
    <div class="stat total"><b>${c.total}</b><span>סה״כ תקלות</span></div>
    <div class="stat open"><b>${(c.new||0)+(c["in-progress"]||0)}</b><span>פתוחות</span></div>
    <div class="stat prog"><b>${c["in-progress"]||0}</b><span>בטיפול</span></div>
    <div class="stat fixed"><b>${c.fixed||0}</b><span>תוקנו</span></div>
    <div class="stat ver"><b>${c.verified||0}</b><span>נבדקו</span></div>
    <div class="stat crit"><b>${c.critical||0}</b><span>קריטיות</span></div>`;
}

function renderSidebar(){
  const f = activeFilters();
  let html = "<h3>לשוניות התוכנה</h3>";
  APP_STRUCTURE.forEach(tab=>{
    let cnt=0; tab.items.forEach(it=>{ cnt += bugsFor(tab.key,it.key).filter(b=>bugMatches(b,it,f)).length; });
    html += `<button class="tab-btn ${tab.key===state.activeTab?'active':''}" onclick="selectTab('${tab.key}')">
      <span class="ic">${tab.icon}</span><span>${tab.name}</span>
      ${cnt?`<span class="cnt">${cnt}</span>`:""}</button>`;
  });
  document.getElementById("sidebar").innerHTML = html;
}

function bugCard(tab,item,b){
  const shots = b.shots.map((s,i)=>`
    <div class="shot"><img src="${s.data}" title="${esc(s.name)}" onclick="lightbox('${s.data}')">
      <button class="del" title="מחק תמונה" onclick="delShot('${tab}','${item.key}','${b.id}',${i})">×</button></div>`).join("");
  const sevOpts = Object.entries(SEVERITIES).map(([v,t])=>`<option value="${v}" ${b.severity===v?"selected":""}>${t}</option>`).join("");
  const stOpts  = Object.entries(STATUSES).map(([v,t])=>`<option value="${v}" ${b.status===v?"selected":""}>${t}</option>`).join("");
  const U = `'${tab}','${item.key}','${b.id}'`;
  return `<div class="bug sev-${b.severity}">
    <div class="bug-top">
      <select title="חומרה" onchange="updBug(${U},'severity',this.value)">${sevOpts}</select>
      <select class="sel-status" data-v="${b.status}" title="סטטוס" onchange="updBug(${U},'status',this.value)">${stOpts}</select>
      <span class="bug-id">#${b.id.slice(-5)}</span>
    </div>
    <div class="fieldbox"><label>תיאור התקלה</label>
      <textarea class="desc" oninput="updBug(${U},'desc',this.value)" placeholder="מה לא עובד?">${esc(b.desc)}</textarea></div>
    <div class="fieldbox"><label>שלבים לשחזור</label>
      <textarea oninput="updBug(${U},'steps',this.value)" placeholder="1. ...&#10;2. ...">${esc(b.steps)}</textarea></div>
    <div class="grid2">
      <div class="fieldbox"><label>תוצאה בפועל</label>
        <textarea oninput="updBug(${U},'actual',this.value)" placeholder="מה קרה">${esc(b.actual)}</textarea></div>
      <div class="fieldbox"><label>תוצאה צפויה</label>
        <textarea oninput="updBug(${U},'expected',this.value)" placeholder="מה היה אמור לקרות">${esc(b.expected)}</textarea></div>
    </div>
    <div class="fieldbox"><label>הערות</label>
      <textarea oninput="updBug(${U},'notes',this.value)">${esc(b.notes)}</textarea></div>
    <div class="dropzone" ondragover="event.preventDefault();this.classList.add('over')"
         ondragleave="this.classList.remove('over')"
         ondrop="event.preventDefault();this.classList.remove('over');addShots(${U},event.dataTransfer.files)"
         onclick="this.querySelector('input').click()">
      📎 גרור לכאן תמונות מסך, או לחץ לבחירה
      <input type="file" accept="image/*" multiple hidden onchange="addShots(${U},this.files)">
    </div>
    ${shots?`<div class="shots">${shots}</div>`:""}
    <div class="bug-actions">
      <button class="btn ghost small" onclick="dupBug(${U})">⧉ שכפל</button>
      <button class="btn danger small" onclick="delBug(${U})">🗑 מחק תקלה</button>
    </div>
  </div>`;
}

function renderContent(){
  const tab = APP_STRUCTURE.find(t=>t.key===state.activeTab);
  const f = activeFilters();
  const filt = filtering(f);
  let html = `<div class="content-head"><h2>${tab.icon} ${tab.name}</h2>
     <span class="desc">${filt?"מוצגות תקלות מסוננות בלבד":"לחץ על פריט כדי להוסיף תקלות"}</span></div>`;
  let shownItems = 0;
  tab.items.forEach(item=>{
    let bugs = bugsFor(tab.key,item.key);
    if(filt){ bugs = bugs.filter(b=>bugMatches(b,item,f)); if(!bugs.length) return; }
    shownItems++;
    html += `<div class="item">
      <div class="item-head">
        <span class="type-badge type-${item.type}">${({field:"שדה",button:"כפתור",action:"פעולה",table:"טבלה"})[item.type]}</span>
        <span class="name">${item.name}</span>
        <span class="grow"></span>
        <span class="idesc">${esc(item.desc||"")}</span>
        <button class="btn small" onclick="newBug('${tab.key}','${item.key}')">+ הוסף תקלה</button>
      </div>
      <div class="item-body">
        ${bugs.length? bugs.map(b=>bugCard(tab.key,item,b)).join("")
                     : '<div class="no-bugs">אין תקלות רשומות לפריט זה.</div>'}
      </div></div>`;
  });
  if(filt && !shownItems) html += `<div class="empty-note">אין תקלות שתואמות את הסינון בלשונית זו.</div>`;
  document.getElementById("content").innerHTML = html;
}

function render(){ updateStats(); renderSidebar(); renderContent(); }
function selectTab(k){ state.activeTab=k; save(); render(); window.scrollTo({top:0,behavior:"smooth"}); }

/* ============================== ייצוא / העתקה ============================== */
function buildReport(){
  const c = countAll();
  let md = `# דוח תקלות — מנהל חלוקה\n\n`;
  md += `נוצר: ${new Date().toLocaleString("he-IL")}\n\n`;
  md += `**סיכום:** סה״כ ${c.total} · פתוחות ${(c.new||0)+(c["in-progress"]||0)} · בטיפול ${c["in-progress"]||0} · תוקנו ${c.fixed||0} · נבדקו ${c.verified||0} · קריטיות ${c.critical||0}\n\n`;
  let any=false;
  APP_STRUCTURE.forEach(tab=>{
    const itemsWithBugs = tab.items.filter(it=>bugsFor(tab.key,it.key).length);
    if(!itemsWithBugs.length) return;
    md += `\n## לשונית: ${tab.name}\n`;
    itemsWithBugs.forEach(it=>{
      md += `\n### ${it.name}\n`;
      bugsFor(tab.key,it.key).forEach((b,i)=>{
        any=true;
        md += `\n**תקלה ${i+1}** (#${b.id.slice(-5)}) — חומרה: ${SEVERITIES[b.severity]} · סטטוס: ${STATUSES[b.status]}\n`;
        if(b.desc)     md += `- תיאור: ${b.desc.replace(/\n/g," ")}\n`;
        if(b.steps)    md += `- שלבי שחזור: ${b.steps.replace(/\n/g," / ")}\n`;
        if(b.actual)   md += `- תוצאה בפועל: ${b.actual.replace(/\n/g," ")}\n`;
        if(b.expected) md += `- תוצאה צפויה: ${b.expected.replace(/\n/g," ")}\n`;
        if(b.notes)    md += `- הערות: ${b.notes.replace(/\n/g," ")}\n`;
        if(b.shots.length) md += `- צורפו ${b.shots.length} תמונות מסך: ${b.shots.map(s=>s.name).join(", ")}\n`;
      });
    });
  });
  if(!any) md += `\n_לא נרשמו תקלות._\n`;
  return md;
}
function download(name,text){
  const blob = new Blob([text],{type:"text/markdown;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function exportReport(){
  const d = new Date(), pad=n=>String(n).padStart(2,"0");
  download(`דוח_תקלות_${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}.md`, buildReport());
  toast("📄 הדוח יוצא");
}
async function copyReport(){
  const txt = buildReport();
  try{ await navigator.clipboard.writeText(txt); toast("📋 הדוח הועתק ללוח"); }
  catch(e){
    const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta);
    ta.select(); try{document.execCommand("copy"); toast("📋 הדוח הועתק ללוח");}catch(_){toast("⚠ ההעתקה נכשלה");}
    ta.remove();
  }
}
function clearAll(){
  if(!confirm("לנקות את כל התקלות שנרשמו? פעולה זו אינה הפיכה.")) return;
  state.bugs={}; save(); render(); toast("נוקו כל התקלות");
}
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ============================== אתחול ============================== */
load(); render();
</script>

</html>
